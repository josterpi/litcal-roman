# --- October ---

# Paul of the Cross is Oct 19 in the universal calendar, but Oct 19 is the
# Memorial of the North American Martyrs in the US; Paul is observed on Oct 20.
- date: "10-20"
  name: "Saint Paul of the Cross, Priest"
  rank: optional_memorial
  color: white

