# United States Proper Calendar (USCCB)
#
# Source: US Conference of Catholic Bishops proper calendar, supplementing
# the General Roman Calendar with saints proper to the United States and
# rank elevations approved by the USCCB.
#
# Schema: same as universal.yaml
#
# Notes
# -----
# - Entries here are appended to universal.yaml entries for the same date.
#   Where the US elevates a universal optional memorial to a memorial, the
#   universal entry remains in the candidate pool; the higher-ranked US entry
#   wins automatically via the precedence resolver.
# - The North American Martyrs (10-19) are elevated from optional memorial
#   to memorial in the US; in the universal calendar Paul of the Cross also
#   falls on 10-19 and is displaced.

# --- January ---

- date: "01-04"
  name: "Saint Elizabeth Ann Seton, Religious"
  rank: memorial
  color: white

- date: "01-05"
  name: "Saint John Neumann, Bishop"
  rank: memorial
  color: white

- date: "01-06"
  name: "Blessed André Bessette, Religious"
  rank: optional_memorial
  color: white

- date: "01-23"
  name: "Saint Marianne Cope, Virgin"
  rank: optional_memorial
  color: white

