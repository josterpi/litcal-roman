# General Roman Calendar — Universal (Ordinary Form)
#
# Source: Roman Missal, Third Typical Edition (2002) and subsequent
# additions to the universal calendar through 2024.
#
# Schema
# ------
# date  : MM-DD (the proper date; transferral logic lives in the orchestrator)
# name  : English name per ICEL / Roman Missal
# rank  : solemnity | feast | memorial | optional_memorial
# color : white | red | green | violet | rose | black
#
# Notes
# -----
# - Temporale feasts (Epiphany, Baptism of the Lord, Ash Wednesday,
#   Ascension, Pentecost, Trinity Sunday, Corpus Christi, etc.) are
#   handled entirely by temporale.py and are not listed here.
# - The Annunciation (03-25) must be transferred by the orchestrator if
#   it falls during Holy Week or the Easter Octave (GNLYC §60).
# - The Immaculate Conception (12-08) must be transferred if it falls on
#   the Second Sunday of Advent.
# - All Souls (11-02) is LORD_FEAST rank; it displaces OT Sundays and
#   requires no transfer when it falls on a Sunday.
# - Multiple entries on the same date represent distinct celebrations
#   (each an optional memorial unless noted otherwise).

